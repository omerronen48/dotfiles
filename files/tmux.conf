# Enable mouse support
set -g mouse on

# Set true color support
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Enable OSC 8 hyperlinks (clickable links in terminal)
set -as terminal-features ",xterm-256color:hyperlinks"

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Keep manual window names (don't auto-rename to running command/host)
set -g allow-rename off
setw -g automatic-rename off

# Increase scrollback buffer size
set -g history-limit 50000

# Display tmux messages for 4 seconds
set -g display-time 4000

# Refresh status bar more often
set -g status-interval 5

# Change prefix to Ctrl+Space (similar to your nvim Space leader)
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Easy config reload
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Navigate panes with prefix + arrow keys (matching nvim leader + arrows)
bind Left select-pane -L
bind Down select-pane -D
bind Up select-pane -U
bind Right select-pane -R

# Split panes with prefix + o + arrow keys (matching nvim leader + o + arrows)
bind o switch-client -T split_table
bind -T split_table Left split-window -h -c "#{pane_current_path}" \; select-pane -L
bind -T split_table Right split-window -h -c "#{pane_current_path}"
bind -T split_table Up split-window -v -c "#{pane_current_path}" \; select-pane -U
bind -T split_table Down split-window -v -c "#{pane_current_path}"

# Traditional split commands (keep these as backup)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Switch windows with prefix + 1-9 (matching nvim leader + 1-9 for buffers)
bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5
bind 6 select-window -t 6
bind 7 select-window -t 7
bind 8 select-window -t 8
bind 9 select-window -t 9

# Create new window with prefix + n (instead of default c)
bind n new-window -c "#{pane_current_path}"

# Close window with prefix + c (matching nvim leader + c for buffer close)
bind c confirm-before -p "kill-window #W? (y/n)" kill-window

# TPM plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Productivity plugins
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'laktak/extrakto'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'craftzdog/tmux-claude-session-manager'

# Theme - choose one (uncomment your preference)
set -g @plugin 'dracula/tmux'
# set -g @plugin 'catppuccin/tmux'

# Plugin settings
# tmux-continuum: auto-restore sessions
set -g @continuum-restore 'on'

# tmux-resurrect: restore vim sessions too
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'

# Dracula theme settings
set -g @dracula-show-powerline true
set -g @dracula-show-left-icon session
set -g @dracula-plugins "cpu-usage ram-usage time"
set -g @dracula-show-flags true
set -g @dracula-refresh-rate 5

# tmux-fzf settings (fuzzy finder - like Telescope in nvim)
# Trigger with prefix + f (matching nvim leader + f for find files)
TMUX_FZF_LAUNCH_KEY="f"
set -g @fzf-goto-session-only 'false'

# extrakto settings (extract text - like yank in nvim)
# Trigger with prefix + e (extract)
set -g @extrakto_key "e"
set -g @extrakto_grab_area "full"
set -g @extrakto_fzf_tool "fzf"
# Copy to clipboard automatically
set -g @extrakto_copy_key "enter"
set -g @extrakto_insert_key "tab"

# tmux-open settings (open files/URLs)
# In copy mode:
#   - o to open highlighted text
#   - Ctrl+o to open in $EDITOR (nvim)
set -g @open-editor 'C-o'

# Initialize TPM (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# Override the claude-session-manager picker (prefix+u) to list ALL panes
# running claude across every session, not just plugin-launched claude-* sessions.
# Must come after `run tpm` so it wins over the plugin's binding.
bind u display-popup -w 80% -h 80% -E "~/.config/tmux/claude-panes.sh"
